<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>about - nenquen</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../assets/styles.css">
    <meta property="og:title" content="about - nenquen">
    <meta property="og:description" content="Learn more about nenquen.">
    <meta property="og:image" content="https://nenquen.github.io/assets/favicon.png">
    <meta property="og:url" content="https://nenquen.github.io/about">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#111111">
    <style>
        .about-content {
            gap: 14px;
            padding: 8px 0;
        }

        .about-avatar {
            width: 96px;
            height: 96px;
            border: 1px solid #333;
        }

        .about-name {
            font-size: 14px;
            color: white;
            letter-spacing: 2px;
        }

        .about-bio {
            border: 1px solid #333;
            padding: 12px 16px;
            width: 100%;
            max-width: 300px;
            text-align: left;
        }

        .about-bio-title {
            font-size: 9px;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .about-bio p {
            margin: 4px 0;
            font-size: 11px;
            line-height: 1.5;
            color: #ccc;
        }

        .about-stats {
            width: 100%;
            max-width: 300px;
            text-align: left;
        }

        .about-stats .info-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
        }

        .about-stats .info-key {
            color: #666;
        }

        .about-stats .info-val {
            color: #ccc;
        }

        .about-link {
            display: inline-block;
            padding: 10px 32px;
            font-size: 12px;
            letter-spacing: 3px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            background-color: #111111;
            transition: background-color 0.2s;
        }

        .about-link:hover {
            background-color: #222;
        }
    </style>
</head>

<body>
    <main class="container">
        <section class="bios-box discord-section">
            <span class="bios-label">about</span>
            <nav class="bios-nav">
                <a href="/" class="bios-link">HOME</a>
                <a href="/discord" class="bios-link">DISCORD</a>
            </nav>
            <div class="bios-content about-content">
                <img class="about-avatar" src="../assets/nen4chan.png" alt="nenquen">

                <div class="about-name">>> NENQUEN <<</div>

                <div class="about-bio">
                    <div class="about-bio-title">// BIO</div>
                    <p>Hello, I'm nenquen. I make things, break things, and sometimes fix them.</p>
                    <p>This site is my little corner of the internet. Thanks for stopping by.</p>
                </div>

                <div class="about-stats">
                    <div class="info-row"><span class="info-key">FROM</span><span class="info-val">Turkey</span></div>
                    <div class="info-row"><span class="info-key">DOING</span><span class="info-val">random stuff</span></div>
                    <div class="info-row"><span class="info-key">SITE</span><span class="info-val">since 2024</span></div>
                </div>

                <a class="about-link" href="https://github.com/nenquen" target="_blank" rel="noopener noreferrer">GITHUB</a>
            </div>
        </section>
    </main>
</body>

</html>
