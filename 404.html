<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - nenquen</title>
    <meta name="theme-color" content="#0414a7">
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link href='https://fonts.googleapis.com/css?family=VT323' rel='stylesheet'>
    <style>
        * { box-sizing: border-box; }

        body, h1, h2, h3, h4, p, a { color: #e0e2f4; }
        body, p { font: normal 20px/1.25rem 'VT323', monospace; margin: 0; }
        h1 { font: normal 2.75rem/1.05em 'VT323', monospace; margin: 0; }
        body { background: #0414a7; padding: 20px; min-height: 100vh; }

        .container {
            width: 90%;
            margin: auto;
            max-width: 640px;
        }

        .bsod {
            padding-top: 10%;
        }

        .bsod .neg {
            text-align: center;
            color: #0414a7;
        }

        .bsod .neg .bg {
            background: #aaaaaa;
            padding: 0 15px 2px 13px;
        }

        .bsod .title { margin-bottom: 50px; }

        .bsod .nav {
            margin-top: 35px;
            text-align: center;
        }

        .bsod .nav .link {
            text-decoration: none;
            padding: 0 9px 2px 8px;
        }

        .bsod .nav .link:hover,
        .bsod .nav .link:focus {
            background: #aaaaaa;
            color: #0414a7;
        }
    </style>
</head>
<body>
    <main class="bsod container">
        <h1 class="neg title"><span class="bg">Error - 404</span></h1>
        <p>An error has occured, to continue:</p>
        <p>* Return to our <a href="/" class="link">homepage</a>.<br />
        * Send us an e-mail about this error and try later.</p>
        <nav class="nav">
            <a href="/" class="link">index</a>&nbsp;|&nbsp;<a href="/about" class="link">about</a>
        </nav>
    </main>
</body>
</html>
