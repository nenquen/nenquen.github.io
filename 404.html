<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - nenquen</title>
    <meta name="theme-color" content="#111111">
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        .container {
            max-width: 480px;
        }

        .error-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
            padding: 20px 10px;
        }

        .error-code {
            font-size: 48px;
            color: white;
            margin: 0;
            font-weight: normal;
            line-height: 1;
        }

        .error-code .highlight {
            background: #333;
            padding: 0 12px 4px 12px;
        }

        .error-desc {
            font-size: 11px;
            color: #bbb;
            line-height: 1.6;
            margin: 0;
        }

        .error-nav {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .error-nav a {
            font-size: 11px;
            color: white;
            text-decoration: underline;
            cursor: pointer;
        }

        .error-nav a:hover {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="bios-box">
            <span class="bios-label">SYSTEM ERROR</span>
            <div class="error-section">
                <h1 class="error-code"><span class="highlight">404</span></h1>
                <p class="error-desc">
                    The requested resource was not found on this server.<br>
                    * Return to the <a href="/">homepage</a>.<br>
                    * Check the <a href="/about">about</a> page for contact info.
                </p>
                <nav class="error-nav">
                    <a href="/">index</a>
                    <a href="/about">about</a>
                    <a href="/discord">discord</a>
                </nav>
            </div>
        </section>
    </div>
</body>
</html>
