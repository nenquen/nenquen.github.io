<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord - nenquen</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="stylesheet" href="../assets/styles.css">
    <meta property="og:title" content="discord - nenquen">
    <meta property="og:description" content="Join nenchan! Discord server.">
    <meta property="og:image" content="https://nenquen.github.io/assets/nen4chan.png">
    <meta property="og:url" content="https://nenquen.github.io/discord">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#111111">
    <style>
        .discord-content {
            gap: 16px;
            padding: 8px 0;
        }

        .discord-image {
            max-width: 280px;
        }

        .discord-header {
            font-size: 14px;
            color: white;
            letter-spacing: 2px;
        }

        .discord-status-box {
            border: 1px solid #333;
            padding: 12px 16px;
            width: 100%;
            max-width: 300px;
            text-align: left;
        }

        .discord-status-title {
            font-size: 9px;
            color: #666;
            letter-spacing: 2px;
            margin-bottom: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 4px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 11px;
        }

        .info-key {
            color: #666;
        }

        .info-val {
            color: #ccc;
        }

        .discord-join {
            padding: 10px 32px;
            font-size: 12px;
            letter-spacing: 3px;
            transition: background-color 0.2s;
        }

        .discord-join:hover {
            background-color: #222 !important;
        }
    </style>
</head>

<body>
    <main class="container">
        <section class="bios-box discord-section">
            <span class="bios-label">discord</span>
            <nav class="bios-nav">
                <a href="/" class="bios-link">HOME</a>
            </nav>
            <div class="bios-content discord-content">
                <img class="discord-image" src="../assets/nen4chan.png" alt="nen4chan">

                <div class="discord-header">>> welCowo :3 <<</div>

                <div class="discord-status-box" id="status-box">
                    <div class="discord-status-title">// SERVER STATUS</div>
                    <div class="info-row"><span class="info-key">SERVER</span><span class="info-val" id="server-name">...</span></div>
                    <div class="info-row"><span class="info-key">ONLINE</span><span class="info-val" id="server-online">...</span></div>
                    <div class="info-row"><span class="info-key">MEMBERS</span><span class="info-val" id="server-members">...</span></div>
                </div>

                <a class="discord-join" href="https://discord.gg/SEhugM3cPN" target="_blank" rel="noopener noreferrer">JOIN</a>
            </div>
        </section>
    </main>

    <script>
        (async function() {
            const INVITE = "SEhugM3cPN";
            const els = {
                name: document.getElementById("server-name"),
                online: document.getElementById("server-online"),
                members: document.getElementById("server-members"),
            };
            try {
                const r = await fetch("https://discord.com/api/v9/invites/" + INVITE + "?with_counts=true");
                if (!r.ok) throw new Error("API returned " + r.status);
                const data = await r.json();
                els.name.textContent = data.guild.name;
                els.online.textContent = data.approximate_presence_count;
                els.members.textContent = data.approximate_member_count;
            } catch (e) {
                els.name.textContent = "N/A";
                els.online.textContent = "N/A";
                els.members.textContent = "N/A";
            }
        })();
    </script>
</body>

</html>
